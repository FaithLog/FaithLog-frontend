services:
  frontend:
    build:
      context: .
    command: npm run start -- --host 0.0.0.0
    environment:
      EXPO_NO_TELEMETRY: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
